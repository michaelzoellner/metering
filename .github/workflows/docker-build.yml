name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  COLLECTOR_IMAGE: ghcr.io/michaelzoellner/metering-collector
  ADMIN_IMAGE:     ghcr.io/michaelzoellner/metering-admin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Collector ──────────────────────────────────────────
      - name: Build and push collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./collector/Dockerfile
          push: true
          tags: ${{ env.COLLECTOR_IMAGE }}:latest

      # ── Admin-Dashboard ────────────────────────────────────
      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          tags: ${{ env.ADMIN_IMAGE }}:latest