name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Startet die Action, sobald Sie Code in den 'main' Branch pushen

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: collector

jobs:
  build-and-push:
    runs-with: ubuntu-latest
    permissions:
      contents: read
      packages: write # Wichtig, um das Image in der Registry zu speichern

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Wird von GitHub automatisch bereitgestellt

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
